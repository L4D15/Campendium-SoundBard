name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build

      - name: Stamp version and download URL into module.json
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          jq --arg v "$VERSION" \
             --arg dl "https://github.com/ongoingpast/Campendium-SoundBard/releases/download/${GITHUB_REF_NAME}/soundbard.zip" \
             '.version = $v | .download = $dl' \
             dist/module.json > dist/module.json.tmp
          mv dist/module.json.tmp dist/module.json

      - name: Zip release artifacts
        run: cd dist && zip -r ../soundbard.zip .

      - name: Extract release notes from CHANGELOG
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          awk -v ver="$VERSION" '
            $0 ~ "^## \\[" ver "\\]" { flag=1; next }
            /^## \[/ { flag=0 }
            flag { print }
          ' CHANGELOG.md > release-notes.md
          if [ ! -s release-notes.md ]; then
            echo "Release ${GITHUB_REF_NAME}" > release-notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: release-notes.md
          files: |
            soundbard.zip
            dist/module.json
